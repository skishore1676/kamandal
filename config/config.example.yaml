# Kamandal Configuration
# Copy this file to config.yaml and fill in your values

app:
  name: kamandal
  log_level: INFO

storage:
  local:
    sqlite_path: data/kamandal.db
    audit_dir: data/audit

# Broker API. Public is the only implemented live adapter right now; the
# tastytrade/schwab sections are placeholders for future adapters.
broker:
  active: public  # public | tastytrade | schwab

  tastytrade:
    username: ""
    password: ""
    account_id: ""
    sandbox: true

  public:
    secret_token: ""
    account_id: ""
    api_base_url: "https://api.public.com"
    auth_endpoint: "https://api.public.com/userapiauthservice/personal/access-tokens"
    session_file: config/public_session.json
    account_cache_file: config/public_account.json
    token_validity_minutes: 60
    api_requests_per_second: 5.0
    api_burst_limit: 5
    require_preflight: true
    sync_portfolio_before_optimizer: true
    sync_portfolio_after_submission: true

# LLM (idea extraction, strategy mining, refinement)
# provider: openai | openrouter | codex_cli
# For OpenRouter, model must be prefixed:
#   anthropic/claude-sonnet-4.5, anthropic/claude-haiku-4.5,
#   openai/gpt-4o, google/gemini-2.5-pro, ...
# See https://openrouter.ai/models
# For Codex CLI, model can be a Codex-supported model like `gpt-5.4`.
llm:
  provider: openai
  api_key: ""
  model: gpt-4o
  fallback_model: ""   # used if primary model raises (rate limit, 5xx, model-not-found)
  base_url: ""   # optional; auto-set to OpenRouter when provider=openrouter
  codex_binary: ""   # optional path to `codex`; auto-discovered if empty
  codex_workdir: ""  # optional working dir for `codex exec`; defaults to repo root
  codex_timeout_seconds: 300

# OpenAI (Whisper audio transcription — still required for idea_scraper live/record modes)
# Also used as fallback for `llm` when llm.api_key is empty and llm.provider=openai.
openai:
  api_key: ""
  model: gpt-4o
  whisper_model: whisper-1

# Google Sheets — human-facing control + reporting plane.
# Configure via env: GOOGLE_API_CREDENTIALS_PATH + KAMANDAL_SHEET_ID.
# Bootstrap tabs with `python -m vol_crush.sheets bootstrap`.
google_sheets:
  credentials_file: ""                  # overridden by GOOGLE_API_CREDENTIALS_PATH
  spreadsheet_id: ""                    # overridden by KAMANDAL_SHEET_ID
  enabled: false                        # overridden by ENABLE_SHEETS_SYNC
  cache_dir: data/sheet_cache           # local JSON mirror used between syncs
  tabs:
    strategies: strategies              # READ: strategy approval control plane
    template_library: template_library  # READ: structure-level template defaults / overrides
    regime_control: regime_control      # READ: optional daily regime override
    profiles: profiles                  # READ: stock_profile-level caps / rules
    universe: universe                  # READ: symbol -> stock_profile membership
    idea_review: idea_review            # BIDIRECTIONAL: human approves LLM-extracted ideas
    daily_plan: daily_plan              # WRITE: today's optimizer output
    positions: positions                # WRITE: grouped Positions with health flags
    source_intelligence: source_intelligence  # WRITE: source quality scorecard
    reflection_summary: reflection_summary    # WRITE: deterministic learning loop summary

# Backtesting
backtesting:
  data_source: polygon  # polygon | orats (phase 2)
  polygon:
    api_key: ""
    # Free tier: 5 calls/min
  lookback_years: 2
  approval_thresholds:
    min_win_rate: 0.65
    min_sharpe: 0.8
    max_drawdown_pct: 25.0

# Portfolio Constraints (hard limits, enforced in code)
portfolio:
  constraints:
    beta_weighted_delta_pct: [-5.0, 5.0]    # % of NLV
    daily_theta_pct: [0.10, 0.30]           # % of NLV
    max_gamma_ratio: 1.5                     # |gamma/theta| cap
    max_vega_pct: 2.0                        # % of NLV
    max_bpr_utilization_pct: 60.0            # soft target the optimizer respects
    hard_bpr_cap_pct: 70.0                   # kill switch level (kept 10pt above soft target)
    max_single_underlying_pct: 15.0          # % of BPR
    max_sector_concentration_pct: 30.0
    min_positions: 3                          # diversification floor
    max_positions: 15                         # complexity cap

  # Regime policy is engine behavior, not today's operator opinion. The Sheet
  # `regime_control` tab can override which regime is active today; these
  # defaults define what each regime means if Sheets is unavailable.
  regimes:
    high_iv:
      prefer_structures: [short_strangle, short_put, iron_condor]
      avoid_structures: []
      allow_undefined_risk: true
      min_iv_rank: 35
      target_delta_bias: 0.5
      reject_event_risk: true
      notes:
        - Favor premium selling when IV rank is elevated and constraints allow it.
    normal_iv:
      prefer_structures: [short_strangle, short_put, put_spread]
      avoid_structures: []
      allow_undefined_risk: true
      min_iv_rank: 18
      max_iv_rank: 34
      target_delta_bias: 0.0
      reject_event_risk: true
      notes:
        - Baseline tastylive-style premium selling regime.
    low_iv:
      prefer_structures: [put_spread, iron_condor]
      avoid_structures: [short_strangle]
      allow_undefined_risk: false
      max_iv_rank: 17
      target_delta_bias: 0.0
      reject_event_risk: true
      notes:
        - Down-rank undefined-risk trades when premiums are thin.
    event_risk:
      prefer_structures: []
      avoid_structures: [short_strangle, short_put, iron_condor]
      allow_undefined_risk: false
      target_delta_bias: 0.0
      reject_event_risk: true
      notes:
        - Reject entries on symbols with near-term event risk or poor fixture quality.

  # Optimizer scoring weights (tune over time)
  optimizer_weights:
    delta_improvement: 0.25
    gamma_profile: 0.20
    theta_improvement: 0.35
    diversification: 0.20

data_sources:
  fixtures:
    bundle_path: data/fixtures/fixture_bundle.json
    replay_path: data/fixtures/replay_trades.json
    import_gds_history_db: /Users/suman/kg_env/projects/public_api_trading_v3/gds_history.db
    import_gds_analysis_json: /Users/suman/kg_env/projects/public_api_trading_v3/analysis/extracted_gds_data.json
    public_seed_symbols: [SPY, IWM, QQQ, DIA, XLF, XLK, XLE, AAPL, AMD, GE, HOOD, INTC, NVDA, RBLX, SMH, TLT, TSLA]
    enable_public_seed_fetch: true

idea_sources:
  youtube:
    channel_ids:
      - UCLJiSMXJ9K-1AOTqIqdXJgQ   # tastylive (@tastyliveshow — primary RSS feed)
      - UCYOHtOzMZGwXBLZX1Ltf78g   # projectoption (Chris Butler — defined-risk spreads)
      - UCQAvjhqp559qSQx2dcg9WVg   # Option Alpha (Kirk Du Plessis — systematic premium selling)
    limit: 5
    # Optional title prefilter — skip transcript fetch + LLM cost for videos
    # whose titles don't match. Case-insensitive. Plain strings are matched as
    # substrings; regex metacharacters are honored ("earnings|IV\\s*rank").
    # Leave both empty to process every video.
    title_include_keywords: []   # e.g. ["earnings", "IV rank", "strangle"]
    title_exclude_keywords: []   # e.g. ["interview", "crypto"]
  rss:
    feed_urls: []
    limit: 5
  web:
    urls: []
  transcripts:
    path: data/transcripts
    # Ordered chain of transcript providers. First provider with a non-empty
    # result wins. Enable/disable per entry; options are provider-specific.
    # Add your own: see vol_crush/transcript_providers/registry.py.
    providers:
      - type: youtube_captions        # free, uses youtube-transcript-api
        enabled: true
        languages: [en, en-US, en-GB]
      - type: groq_whisper            # paid audio fallback; OFF by default
        enabled: false
        api_key_env: GROQ_API_KEY     # env var to read the key from
        model: whisper-large-v3-turbo
        audio_bitrate_kbps: 64
        upload_limit_mb: 24           # Groq free tier ~25MB
        chunk_seconds: 600            # 10-min chunks if audio > upload limit
        max_audio_minutes: 240        # cost guard — skip anything longer
    # Retry window for retry_transcripts CLI. Most YouTube live streams get
    # auto-captions 6-24h after broadcast ends, so min_age_hours defaults to
    # 20 to avoid re-hitting YouTube on fresh streams that won't have captions.
    retry:
      min_age_hours: 20
      max_age_hours: 168              # 7 days
  # Archived copies of fetched transcripts (for audit + human spot-check).
  # Purged at the start of each fetch run once files age past retention_days.
  transcripts_archive:
    path: data/transcripts/archive
    retention_days: 14
  # Markdown summaries written by the transcript summary LLM pass, one file
  # per video: <summaries_archive.path>/<YYYY-MM-DD>/<video_id>_summary.md
  summaries_archive:
    path: data/ideas

intelligence:
  agent_candidates:
    enabled: false       # shadow-only: let Kamandal propose internal playbook/universe candidates
    max_candidates: 3
    allowed_structures: []  # optional StrategyType allowlist; empty uses regime prefer_structures

# Execution
execution:
  # shadow = full preflight + write PendingOrder, do NOT submit to broker.
  # dry_run = preflight only, no PendingOrder written.
  # live    = submit to broker (gated on backtest_approved AND dry_run_passed
  #           per strategy in vol_crush/optimizer/service.py).
  # "pending" is accepted as a deprecated alias for "shadow".
  mode: shadow
  order_type: limit
  time_in_force: DAY
  price_improvement_attempts: 3
  price_step_cents: 1
  fill_timeout_seconds: 120
  max_slippage_pct: 2.0
  shadow_net_liquidation_value: 100000.0  # used only in dry_run/shadow when broker NLV is zero
  auto_approve_ideas: false              # pending/missing idea_review rows pass unless explicitly reject/hold
  max_contracts_per_order: 1   # first-live-test guardrail; raise deliberately later
  submit_to_broker: true

# Audio capture (Module 1)
audio:
  capture_device: default  # or specific device name
  sample_rate: 16000
  channels: 1
